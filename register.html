<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Casino Royal">
<meta name="theme-color" content="#0A2E22">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Casino Royal · Rejoindre la table</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --felt-dark:#0A2E22;--felt-mid:#0F4A36;--felt-light:#146349;
  --gold:#D4AF37;--gold-light:#F0D584;--gold-dim:#8A7326;
  --burgundy:#6E1423;--cream:#F3E9D2;--ink:#0C0C0C;
}
html,body{min-height:100%;background:var(--felt-dark);color:var(--cream);font-family:'Cormorant Garamond',serif;overflow-x:hidden}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(212,175,55,.08) 0%, transparent 55%),
    repeating-linear-gradient(135deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 2px, transparent 2px, transparent 6px),
    linear-gradient(160deg, var(--felt-mid) 0%, var(--felt-dark) 60%, #071f17 100%);
}
/* ── Ornements suits flottants ── */
.suit-float{position:fixed;font-size:2rem;color:var(--gold-dim);opacity:.12;pointer-events:none;z-index:0;animation:drift 18s linear infinite}
@keyframes drift{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-40px) rotate(15deg)}}

.frame{
  position:relative;z-index:1;width:100%;max-width:460px;
  background:linear-gradient(180deg, rgba(15,74,54,.55), rgba(10,46,34,.75));
  border:1px solid var(--gold-dim);
  border-radius:4px;
  padding:2px;
  box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(212,175,55,.15);
}
.frame-inner{
  border:1px solid rgba(212,175,55,.5);
  border-radius:3px;
  padding:38px 32px 32px;
  position:relative;
}
.corner{position:absolute;width:22px;height:22px;border:2px solid var(--gold)}
.corner.tl{top:6px;left:6px;border-right:none;border-bottom:none}
.corner.tr{top:6px;right:6px;border-left:none;border-bottom:none}
.corner.bl{bottom:6px;left:6px;border-right:none;border-top:none}
.corner.br{bottom:6px;right:6px;border-left:none;border-top:none}

.brand{text-align:center;margin-bottom:6px}
.brand .eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.35em;color:var(--gold-dim);text-transform:uppercase}
.brand h1{
  font-family:'Cinzel',serif;font-weight:700;font-size:2.05rem;letter-spacing:.06em;
  background:linear-gradient(180deg,var(--gold-light),var(--gold) 55%,var(--gold-dim));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin:4px 0 10px;text-shadow:0 2px 12px rgba(212,175,55,.25);
}
.suits-divider{text-align:center;color:var(--gold);letter-spacing:.6em;font-size:.85rem;margin-bottom:22px;opacity:.85}
.suits-divider span:nth-child(odd){color:var(--burgundy)}

.tagline{text-align:center;font-style:italic;color:var(--cream);opacity:.75;font-size:1.05rem;margin-bottom:28px}

form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);opacity:.85}
.field input{
  background:rgba(0,0,0,.25);border:1px solid rgba(212,175,55,.35);border-radius:2px;
  padding:12px 14px;color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:1.15rem;
  transition:border-color .2s, box-shadow .2s;
}
.field input::placeholder{color:rgba(243,233,210,.35)}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.15)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.btn-join{
  margin-top:8px;
  background:linear-gradient(180deg,var(--gold-light),var(--gold) 55%,var(--gold-dim));
  color:var(--ink);font-family:'Cinzel',serif;font-weight:700;letter-spacing:.08em;
  border:none;border-radius:2px;padding:15px;font-size:1rem;cursor:pointer;
  text-transform:uppercase;box-shadow:0 8px 24px rgba(212,175,55,.25);
  transition:transform .15s, box-shadow .15s;
}
.btn-join:hover{transform:translateY(-1px);box-shadow:0 12px 30px rgba(212,175,55,.35)}
.btn-join:active{transform:translateY(0)}
.btn-join:disabled{opacity:.6;cursor:wait}

.msg{text-align:center;font-size:.9rem;margin-top:14px;min-height:20px;font-family:'DM Mono',monospace}
.msg.error{color:#e8748a}
.msg.ok{color:var(--gold-light)}

.footer-note{text-align:center;margin-top:22px;font-size:.75rem;color:rgba(243,233,210,.4);font-family:'DM Mono',monospace;letter-spacing:.03em}

@media (max-width:420px){
  .row2{grid-template-columns:1fr}
  .brand h1{font-size:1.7rem}
}
</style>
</head>
<body>

<div class="suit-float" style="top:8%;left:6%">♠</div>
<div class="suit-float" style="top:18%;right:8%;animation-delay:-4s">♥</div>
<div class="suit-float" style="bottom:14%;left:10%;animation-delay:-9s">♦</div>
<div class="suit-float" style="bottom:22%;right:12%;animation-delay:-13s">♣</div>

<div class="frame">
  <div class="frame-inner">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="brand">
      <div class="eyebrow">Programme de fidélité</div>
      <h1 id="brandName">CASINO ROYAL</h1>
    </div>
    <div class="suits-divider"><span>♠</span><span>♥</span><span>♦</span><span>♣</span></div>
    <p class="tagline">« La chance sourit à ceux qui reviennent »</p>

    <form id="registerForm">
      <div class="row2">
        <div class="field">
          <label for="prenom">Prénom</label>
          <input id="prenom" type="text" placeholder="Jean" required autocomplete="given-name">
        </div>
        <div class="field">
          <label for="nom">Nom</label>
          <input id="nom" type="text" placeholder="Dupont" required autocomplete="family-name">
        </div>
      </div>
      <div class="field">
        <label for="tel">Numéro de téléphone</label>
        <input id="tel" type="tel" placeholder="06 12 34 56 78" required autocomplete="tel">
      </div>
      <div class="field">
        <label for="email">Adresse email</label>
        <input id="email" type="email" placeholder="jean.dupont@email.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-join" id="submitBtn">Rejoindre la table</button>
      <div class="msg" id="formMsg"></div>
    </form>

    <div class="footer-note">Vos données servent uniquement au programme de fidélité du stand.</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ============================================================
   ⚠️ CONFIGURATION FIREBASE — À REMPLACER PAR LE PROJET DU CLIENT
   1. Créer un projet sur https://console.firebase.google.com
   2. Ajouter une application Web
   3. Copier la config ci-dessous (identique dans register.html,
      client.html et admin.html)
   4. Activer Firestore (mode production) et coller le contenu
      de firestore.rules dans l'onglet Règles
   ============================================================ */
const firebaseConfig = {
  apiKey: "REPLACE_ME",
  authDomain: "REPLACE_ME.firebaseapp.com",
  projectId: "REPLACE_ME",
  storageBucket: "REPLACE_ME.firebasestorage.app",
  messagingSenderId: "REPLACE_ME",
  appId: "REPLACE_ME"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Nom du stand (modifiable depuis admin.html > Réglages)
getDoc(doc(db,'config','general')).then(snap => {
  if (snap.exists() && snap.data().standName) {
    const name = snap.data().standName;
    document.getElementById('brandName').textContent = name;
    document.title = name + ' · Rejoindre la table';
  }
}).catch(() => {});

const form = document.getElementById('registerForm');
const msgEl = document.getElementById('formMsg');
const btn = document.getElementById('submitBtn');

function normalizeTel(t){ return t.replace(/[\s.\-]/g,''); }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msgEl.textContent = '';
  msgEl.className = 'msg';
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  const prenom = document.getElementById('prenom').value.trim();
  const nom = document.getElementById('nom').value.trim();
  const tel = normalizeTel(document.getElementById('tel').value.trim());
  const email = document.getElementById('email').value.trim().toLowerCase();

  try {
    // Vérifie si le téléphone existe déjà (évite les doublons de fiche)
    const q = query(collection(db, 'clients'), where('telephone', '==', tel));
    const existing = await getDocs(q);

    if (!existing.empty) {
      const clientId = existing.docs[0].id;
      localStorage.setItem('casinoClientId', clientId);
      msgEl.textContent = 'Fiche existante retrouvée, redirection...';
      msgEl.className = 'msg ok';
      setTimeout(() => window.location.href = `client.html?id=${clientId}`, 700);
      return;
    }

    const newDocRef = doc(collection(db, 'clients'));
    await setDoc(newDocRef, {
      prenom, nom, telephone: tel, email,
      points: 0,
      createdAt: serverTimestamp(),
      lastActivity: serverTimestamp()
    });

    localStorage.setItem('casinoClientId', newDocRef.id);
    msgEl.textContent = 'Bienvenue à la table !';
    msgEl.className = 'msg ok';
    setTimeout(() => window.location.href = `client.html?id=${newDocRef.id}`, 700);

  } catch (err) {
    console.error(err);
    msgEl.textContent = "Erreur : vérifiez la configuration Firebase.";
    msgEl.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Rejoindre la table';
  }
});

// Auto-redirect si fiche déjà connue sur cet appareil
const savedId = localStorage.getItem('casinoClientId');
if (savedId) {
  const p = new URLSearchParams(window.location.search);
  if (!p.get('force')) {
    window.location.href = `client.html?id=${savedId}`;
  }
}
</script>
</body>
</html>
