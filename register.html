<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Casino Royal">
<meta name="theme-color" content="#150A0E">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Casino Royal · Rejoindre la table</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#120810;--near-black:#1C0D14;
  --red:#D42A3C;--red-deep:#8C1024;--red-glow:#FF3B4E;
  --gold:#FFCB3C;--gold-light:#FFE8A3;--gold-deep:#C9971F;
  --green:#0E7A4E;--green-deep:#0A5236;
  --cream:#FFF6E8;--ink:#0C0C0C;
  --purple:#3B1245;
}
html,body{min-height:100%;background:var(--black);color:var(--cream);font-family:'Poppins',sans-serif}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,203,60,.16) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 15% 100%, rgba(212,42,60,.28) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 85% 100%, rgba(59,18,69,.35) 0%, transparent 60%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 2px, transparent 2px, transparent 14px),
    linear-gradient(160deg, var(--near-black) 0%, var(--black) 70%);
}

/* ── Jetons de poker décoratifs ── */
.chip{position:fixed;pointer-events:none;z-index:0;filter:drop-shadow(0 8px 18px rgba(0,0,0,.5));animation:chip-float 7s ease-in-out infinite}
@keyframes chip-float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(8deg)}}
.chip.c1{top:6%;left:4%;width:64px;height:64px;animation-delay:0s}
.chip.c2{top:14%;right:5%;width:52px;height:52px;animation-delay:-2.3s}
.chip.c3{bottom:8%;left:6%;width:58px;height:58px;animation-delay:-4.1s}
.chip.c4{bottom:16%;right:6%;width:46px;height:46px;animation-delay:-1.2s}
.chip.c5{top:44%;left:1%;width:38px;height:38px;animation-delay:-3.4s;opacity:.7}
.chip.c6{top:52%;right:1.5%;width:40px;height:40px;animation-delay:-5.2s;opacity:.7}

/* ── Cartes à jouer décoratives ── */
.deco-card{position:fixed;pointer-events:none;z-index:0;width:56px;height:78px;background:var(--cream);border-radius:6px;
  box-shadow:0 10px 22px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.5rem}
.deco-card.red{color:var(--red)}
.deco-card.black{color:#141414}
.deco-card.a1{top:22%;left:2%;transform:rotate(-18deg)}
.deco-card.a2{bottom:26%;right:3%;transform:rotate(14deg)}

.frame{
  position:relative;z-index:1;width:100%;max-width:460px;
  background:linear-gradient(180deg, rgba(28,13,20,.85), rgba(18,8,16,.92));
  border-radius:14px;padding:4px;
  box-shadow:0 24px 70px rgba(0,0,0,.65), 0 0 0 1px rgba(255,203,60,.2);
}
.frame-border{
  background:linear-gradient(135deg, var(--gold), var(--red) 35%, var(--gold-deep) 70%, var(--gold));
  border-radius:14px;padding:3px;
}
.frame-inner{
  background:linear-gradient(180deg, var(--near-black), var(--black));
  border:1px solid rgba(255,203,60,.35);
  border-radius:11px;
  padding:34px 30px 28px;
  position:relative;
}

/* Badge machine à sous */
.slot-badge{
  display:flex;justify-content:center;gap:6px;margin-bottom:14px;
}
.slot-badge .reel-mini{
  width:38px;height:38px;background:#0a0a0a;border:2px solid var(--gold);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  box-shadow:inset 0 0 8px rgba(0,0,0,.7), 0 0 12px rgba(255,203,60,.25);
}

.brand{text-align:center;margin-bottom:8px}
.brand .eyebrow{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.3em;color:var(--gold-light);text-transform:uppercase;opacity:.85}
.brand h1{
  font-family:'Bungee',cursive;font-weight:400;font-size:2.15rem;letter-spacing:.02em;line-height:1.15;
  color:var(--gold);
  -webkit-text-stroke:1px rgba(140,16,36,.6);
  text-shadow:0 0 18px rgba(255,203,60,.4), 3px 3px 0 var(--red-deep);
  margin:6px 0 12px;
}
.suits-divider{text-align:center;letter-spacing:.5em;font-size:1.1rem;margin-bottom:18px}
.suits-divider span{display:inline-block;margin:0 2px}
.suits-divider .r{color:var(--red)}
.suits-divider .b{color:var(--cream)}

.tagline{text-align:center;font-weight:500;color:var(--gold-light);font-size:1.02rem;margin-bottom:26px;opacity:.9}

form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);opacity:.9}
.field input{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,203,60,.3);border-radius:8px;
  padding:13px 14px;color:var(--cream);font-family:'Poppins',sans-serif;font-weight:500;font-size:1.02rem;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder{color:rgba(255,246,232,.35);font-weight:400}
.field input:focus{outline:none;border-color:var(--gold);background:rgba(255,203,60,.08);box-shadow:0 0 0 4px rgba(255,203,60,.15)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.btn-join{
  margin-top:8px;position:relative;
  background:linear-gradient(180deg,var(--gold-light) 0%,var(--gold) 45%,var(--gold-deep) 100%);
  color:var(--ink);font-family:'Bungee',cursive;font-weight:400;letter-spacing:.03em;
  border:none;border-radius:10px;padding:16px;font-size:1.05rem;cursor:pointer;
  text-transform:uppercase;box-shadow:0 10px 26px rgba(255,203,60,.3), inset 0 -3px 0 rgba(0,0,0,.15);
  transition:transform .15s, box-shadow .15s;
}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(255,203,60,.4), inset 0 -3px 0 rgba(0,0,0,.15)}
.btn-join:active{transform:translateY(0)}
.btn-join:disabled{opacity:.6;cursor:wait}

.msg{text-align:center;font-size:.92rem;margin-top:14px;min-height:20px;font-family:'Poppins',sans-serif;font-weight:600}
.msg.error{color:var(--red-glow)}
.msg.ok{color:var(--gold)}

.footer-note{text-align:center;margin-top:22px;font-size:.78rem;color:rgba(255,246,232,.45);font-family:'Poppins',sans-serif;letter-spacing:.01em}

@media (max-width:420px){
  .row2{grid-template-columns:1fr}
  .brand h1{font-size:1.7rem}
  .chip.c1,.chip.c2,.chip.c3,.chip.c4{display:none}
  .deco-card{display:none}
}
</style>
</head>
<body>

<!-- Jetons de poker décoratifs (SVG) -->
<svg class="chip c1" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#8C1024" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="30" fill="none" stroke="#FFF6E8" stroke-width="4" stroke-dasharray="6 8"/><circle cx="32" cy="32" r="19" fill="#D42A3C" stroke="#FFCB3C" stroke-width="2"/><text x="32" y="39" text-anchor="middle" font-family="Bungee, cursive" font-size="16" fill="#FFE8A3">7</text></svg>
<svg class="chip c2" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#0A5236" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="30" fill="none" stroke="#FFF6E8" stroke-width="4" stroke-dasharray="6 8"/><circle cx="32" cy="32" r="19" fill="#0E7A4E" stroke="#FFCB3C" stroke-width="2"/><text x="32" y="39" text-anchor="middle" font-family="Bungee, cursive" font-size="20" fill="#FFE8A3">♣</text></svg>
<svg class="chip c3" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#1C0D14" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="30" fill="none" stroke="#FFF6E8" stroke-width="4" stroke-dasharray="6 8"/><circle cx="32" cy="32" r="19" fill="#3B1245" stroke="#FFCB3C" stroke-width="2"/><text x="32" y="39" text-anchor="middle" font-family="Bungee, cursive" font-size="20" fill="#FFE8A3">♠</text></svg>
<svg class="chip c4" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#8C1024" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="30" fill="none" stroke="#FFF6E8" stroke-width="4" stroke-dasharray="6 8"/><circle cx="32" cy="32" r="19" fill="#D42A3C" stroke="#FFCB3C" stroke-width="2"/><text x="32" y="39" text-anchor="middle" font-family="Bungee, cursive" font-size="20" fill="#FFE8A3">♥</text></svg>
<svg class="chip c5" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#0A5236" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="19" fill="#0E7A4E"/></svg>
<svg class="chip c6" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#1C0D14" stroke="#FFCB3C" stroke-width="2"/><circle cx="32" cy="32" r="19" fill="#3B1245"/></svg>

<div class="deco-card a1 red">A♥</div>
<div class="deco-card a2 black">K♠</div>

<div class="frame">
  <div class="frame-border">
    <div class="frame-inner">

      <div class="slot-badge">
        <div class="reel-mini">🍒</div>
        <div class="reel-mini">7️⃣</div>
        <div class="reel-mini">💎</div>
      </div>

      <div class="brand">
        <div class="eyebrow">Programme de fidélité</div>
        <h1>CASINO ROYAL</h1>
      </div>
      <div class="suits-divider"><span class="r">♠</span><span class="r">♥</span><span class="b">♦</span><span class="b">♣</span></div>
      <p class="tagline">La chance sourit à ceux qui reviennent</p>

      <form id="registerForm">
        <div class="row2">
          <div class="field">
            <label for="prenom">Prénom</label>
            <input id="prenom" type="text" placeholder="Jean" required autocomplete="given-name">
          </div>
          <div class="field">
            <label for="nom">Nom</label>
            <input id="nom" type="text" placeholder="Dupont" required autocomplete="family-name">
          </div>
        </div>
        <div class="field">
          <label for="tel">Numéro de téléphone</label>
          <input id="tel" type="tel" placeholder="06 12 34 56 78" required autocomplete="tel">
        </div>
        <div class="field">
          <label for="email">Adresse email</label>
          <input id="email" type="email" placeholder="jean.dupont@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn-join" id="submitBtn">Rejoindre la table</button>
        <div class="msg" id="formMsg"></div>
      </form>

      <div class="footer-note">Vos données servent uniquement au programme de fidélité du stand.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ============================================================
   ⚠️ CONFIGURATION FIREBASE — À REMPLACER PAR LE PROJET DU CLIENT
   1. Créer un projet sur https://console.firebase.google.com
   2. Ajouter une application Web
   3. Copier la config ci-dessous (identique dans register.html,
      client.html et admin.html)
   4. Activer Firestore (mode production) et coller le contenu
      de firestore.rules dans l'onglet Règles
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDpQTC-a2uaiMCkwnfCKzDWJJ4PqZJ7pts",
  authDomain: "montecarlo-play.firebaseapp.com",
  projectId: "montecarlo-play",
  storageBucket: "montecarlo-play.firebasestorage.app",
  messagingSenderId: "704314582373",
  appId: "1:704314582373:web:6518d788c7abb7972ead8c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Nom du stand (modifiable depuis admin.html > Réglages)
getDoc(doc(db,'config','general')).then(snap => {
  if (snap.exists() && snap.data().standName) {
    const name = snap.data().standName;
    document.querySelector('.brand h1').textContent = name;
    document.title = name + ' · Rejoindre la table';
  }
}).catch(() => {});

const form = document.getElementById('registerForm');
const msgEl = document.getElementById('formMsg');
const btn = document.getElementById('submitBtn');

function normalizeTel(t){ return t.replace(/[\s.\-]/g,''); }

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), ms))
  ]);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msgEl.textContent = '';
  msgEl.className = 'msg';
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  const prenom = document.getElementById('prenom').value.trim();
  const nom = document.getElementById('nom').value.trim();
  const tel = normalizeTel(document.getElementById('tel').value.trim());
  const email = document.getElementById('email').value.trim().toLowerCase();

  try {
    const q = query(collection(db, 'clients'), where('telephone', '==', tel));
    const existing = await withTimeout(getDocs(q), 10000);

    if (!existing.empty) {
      const clientId = existing.docs[0].id;
      localStorage.setItem('casinoClientId', clientId);
      msgEl.textContent = 'Fiche existante retrouvée, redirection...';
      msgEl.className = 'msg ok';
      setTimeout(() => window.location.href = `client.html?id=${clientId}`, 700);
      return;
    }

    const newDocRef = doc(collection(db, 'clients'));
    await withTimeout(setDoc(newDocRef, {
      prenom, nom, telephone: tel, email,
      points: 0,
      createdAt: serverTimestamp(),
      lastActivity: serverTimestamp()
    }), 10000);

    localStorage.setItem('casinoClientId', newDocRef.id);
    msgEl.textContent = 'Bienvenue à la table !';
    msgEl.className = 'msg ok';
    setTimeout(() => window.location.href = `client.html?id=${newDocRef.id}`, 700);

  } catch (err) {
    console.error(err);
    let detail = err && err.message ? err.message : 'inconnue';
    if (detail === 'TIMEOUT') detail = "délai dépassé — vérifiez votre connexion internet ou qu'une extension (antivirus/bloqueur) ne bloque pas Google/Firebase.";
    else if (detail.includes('permission')) detail = "permissions refusées — vérifiez que les règles Firestore ont bien été publiées.";
    msgEl.textContent = "Erreur : " + detail;
    msgEl.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Rejoindre la table';
  }
});

const savedId = localStorage.getItem('casinoClientId');
if (savedId) {
  const p = new URLSearchParams(window.location.search);
  if (!p.get('force')) {
    window.location.href = `client.html?id=${savedId}`;
  }
}
</script>
</body>
</html>
